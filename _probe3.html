<!doctype html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head><body>
  <section class="section details-section">
    <h2 class="section-title">The details</h2>
    <div class="detail-card">
      <div class="detail-item">
        <svg class="detail-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="5" width="18" height="16" rx="2.5"/>
          <path d="M3 9.5h18M8 3v4M16 3v4"/>
        </svg>
        <div class="detail-text">
          <span class="detail-main">Friday, July 17, 2026</span>
          <span class="detail-sub">7:00 PM</span>
        </div>
      </div>
      <div class="detail-divider"></div>
      <div class="detail-item">
        <svg class="detail-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/>
          <circle cx="12" cy="10" r="2.5"/>
        </svg>
        <div class="detail-text">
          <span class="detail-main">Venice Hall · El Nasr Club</span>
          <span class="detail-sub">Smouha, Alexandria, Egypt</span>
        </div>
      </div>
    </div>
    <div class="action-row">
      <a class="btn btn-primary" href="#">Open in Google Maps</a>
      <a class="btn" href="#">Add to Google Calendar</a>
      <button class="btn" type="button">Download .ics</button>
    </div>
  </section>
</body></html>
