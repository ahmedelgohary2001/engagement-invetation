<!doctype html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head><body>
  <header class="hero">
    <div class="hero-text">
      <p class="kicker">You're invited to our engagement</p>
      <h1 class="names"><span>Ahmed</span><span class="amp">&amp;</span><span>Nada</span></h1>
    </div>
  </header>
  <section class="section countdown-section">
    <h2 class="section-title">Counting the days</h2>
    <div class="countdown">
      <div class="cd-cell"><span class="cd-num">32</span><span class="cd-label">days</span></div>
      <div class="cd-cell"><span class="cd-num">11</span><span class="cd-label">hours</span></div>
      <div class="cd-cell"><span class="cd-num">47</span><span class="cd-label">minutes</span></div>
      <div class="cd-cell"><span class="cd-num">09</span><span class="cd-label">seconds</span></div>
    </div>
  </section>
  <footer class="footer"><p>July 17, 2026 · Alexandria</p></footer>
</body></html>
