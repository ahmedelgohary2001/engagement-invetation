<!doctype html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head><body>
  <section class="section details-section">
    <div class="detail-card">
      <div class="accordion">
        <div class="acc-item open">
          <button type="button" class="acc-trigger" aria-expanded="true"><span class="acc-title">Dress code</span>
            <svg class="acc-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg></button>
          <div class="acc-panel"><div class="acc-panel-inner">
            <p>Formal, garden-elegant attire — we'd love to see you dressed up.</p>
            <p class="dress-note">Ladies, we kindly ask that you avoid <strong>pink and its shades</strong> — these are reserved for our bride. 💗</p>
            <ul class="color-list" aria-label="Shades of pink to avoid">
              <li><span class="swatch" style="background:#FFC0CB"></span>Pink</li>
              <li><span class="swatch" style="background:#F7CAD0"></span>Blush</li>
              <li><span class="swatch" style="background:#F2789F"></span>Rose</li>
              <li><span class="swatch" style="background:#FF69B4"></span>Hot pink</li>
              <li><span class="swatch" style="background:#E0218A"></span>Fuchsia</li>
              <li><span class="swatch" style="background:#C71585"></span>Magenta</li>
              <li><span class="swatch" style="background:#FA8072"></span>Salmon</li>
              <li><span class="swatch" style="background:#C48793"></span>Dusty rose</li>
            </ul>
          </div></div>
        </div>
        <div class="acc-item">
          <button type="button" class="acc-trigger" aria-expanded="false"><span class="acc-title">Parking &amp; arrival</span>
            <svg class="acc-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg></button>
          <div class="acc-panel"><div class="acc-panel-inner"><p>Valet available.</p></div></div>
        </div>
      </div>
    </div>
  </section>
</body></html>
