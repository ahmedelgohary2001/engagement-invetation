<!doctype html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head><body>
  <section class="section details-section">
    <div class="detail-card">
      <div class="accordion">
        <div class="acc-item open">
          <button type="button" class="acc-trigger" aria-expanded="true"><span class="acc-title">Dress code</span>
            <svg class="acc-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg></button>
          <div class="acc-panel"><div class="acc-panel-inner">
            <p>Formal, garden-elegant attire — we'd love to see you dressed up.</p>
            <p class="dress-note">Ladies, we kindly ask that you avoid the colors below — <strong>white &amp; off-white are reserved for our bride</strong>. 💗</p>
            <ul class="color-list" aria-label="Colors to avoid">
              <li><span class="swatch" style="background:#FFFFFF"></span>White</li>
              <li><span class="swatch" style="background:#F3ECDF"></span>Off-white</li>
              <li><span class="swatch" style="background:#FFB6C9"></span>Pink &amp; its shades</li>
              <li><span class="swatch" style="background:#D11A2A"></span>Red</li>
            </ul>
          </div></div>
        </div>
      </div>
    </div>
  </section>
</body></html>
